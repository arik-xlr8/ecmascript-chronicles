<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>JS Mini Playground</title>

<style>

body{
    margin:0;
    background:#0f172a;
    font-family:Arial;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
}

h1{
    margin-bottom:20px;
}

#gameArea{
    width:700px;
    height:400px;
    background:#1e293b;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

button{
    margin:20px;
    padding:12px 24px;
    border:none;
    border-radius:10px;
    font-size:16px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.ball{
    position:absolute;
    width:40px;
    height:40px;
    border-radius:50%;
}

</style>
</head>

<body>

<h1>JavaScript Mini Playground</h1>

<button id="spawnBtn">Create a Ball</button>

<div id="gameArea"></div>

<script>

const gameArea = document.querySelector("#gameArea");
const spawnBtn = document.querySelector("#spawnBtn");

spawnBtn.addEventListener("click", createBall);

function createBall(){

    const ball = document.createElement("div");

    ball.classList.add("ball");

    const size = Math.random()*40 + 30;

    ball.style.width = size+"px";
    ball.style.height = size+"px";

    ball.style.background =
    "hsl("+Math.random()*360+",70%,60%)";

    ball.style.left = Math.random()*650 + "px";
    ball.style.top = Math.random()*350 + "px";

    gameArea.appendChild(ball);

    let dx = (Math.random()*4)+1;
    let dy = (Math.random()*4)+1;

    function moveBall(){

        let x = ball.offsetLeft;
        let y = ball.offsetTop;

        if(x <= 0 || x + ball.offsetWidth >= gameArea.clientWidth){
            dx = -dx;
        }

        if(y <= 0 || y + ball.offsetHeight >= gameArea.clientHeight){
            dy = -dy;
        }

        ball.style.left = x + dx + "px";
        ball.style.top = y + dy + "px";
    }

    const movement = setInterval(moveBall,20);

    ball.addEventListener("click",function(){

        clearInterval(movement);

        ball.style.transform="scale(1.6)";
        ball.style.opacity="0";

        setTimeout(()=>{
            ball.remove();
        },200);

    });

}

</script>

</body>
</html>
